name: Hugo Custom Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Grant permissions to allow the deployment to happen
permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 0.145.0
          extended: true

      - name: Install Dependencies
        run: |
          hugo mod get -u
          hugo mod tidy

      - name: Build
        run: |
          # Force Hugo to download the theme and place it in a local _vendor folder
          hugo mod vendor
          # Build using the local vendor folder instead of the hidden cache
          hugo --minify

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4